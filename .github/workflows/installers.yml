name: Build Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional tag/version label (example: v1.0.0). If set, artifacts will include it in the name."
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: ${{ matrix.os }} installers
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build desktop (Windows)
        if: runner.os == 'Windows'
        run: npm run desktop:dist:win

      - name: Build desktop (macOS)
        if: runner.os == 'macOS'
        run: npm run desktop:dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aelyn-finance-${{ runner.os }}${{ inputs.version && format('-{0}', inputs.version) || '' }}
          path: release/**

  release:
    name: Attach to GitHub Release (tag builds)
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
